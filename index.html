<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9BETS - WinGo</title>
    <style>
        :root {
            --bg-base: #100524;
            --bg-panel: #1e0a3c;
            --bg-card: #2c0e5a;
            --violet-primary: #8b5cf6;
            --violet-glow: #c4b5fd;
            --flame-red: #dc2626;
            --flame-orange: #ea580c;
            --win-green: #10b981;
            --text-light: #f8fafc;
            --text-muted: #a78bfa;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-light);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            width: 100%; max-width: 420px;
            min-height: 100vh;
            background: var(--bg-base);
            position: relative;
            padding-bottom: 70px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        
        /* Header & Balance Card */
        .top-header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-panel));
            padding: 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
            position: relative;
        }
        .brand-title {
            font-size: 1.2rem; font-weight: 800;
            background: linear-gradient(to right, #facc15, var(--flame-orange));
            -webkit-background-clip: text; color: transparent;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .balance-label { font-size: 0.85rem; color: var(--text-muted); }
        .balance-amount { font-size: 2.5rem; font-weight: bold; margin: 5px 0; color: #fff; }
        
        .action-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; padding: 20px; text-align: center;
        }
        .action-icon {
            background: var(--bg-panel); border: 1px solid var(--violet-primary);
            border-radius: 12px; padding: 12px 5px; cursor: pointer;
            font-size: 0.8rem; color: var(--violet-glow);
            transition: all 0.2s;
        }
        .action-icon:hover { background: var(--bg-card); transform: translateY(-2px); }

        /* Game Interface */
        .game-section { padding: 0 15px; display: none;}
        .game-section.active { display: block; }
        
        .timer-header {
            background: var(--bg-panel); padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(139, 92, 246, 0.3); margin-bottom: 15px;
        }
        .period-box { text-align: left; }
        .period-lbl { font-size: 0.75rem; color: var(--text-muted); }
        .period-val { font-size: 1.1rem; font-weight: bold; font-family: monospace; }
        
        .countdown-box { text-align: right; }
        .countdown-val { font-size: 1.8rem; font-weight: bold; color: var(--flame-orange); font-family: monospace;}

        /* Betting Matrix */
        .color-matrix { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .color-btn {
            padding: 15px 0; border: none; border-radius: 8px; font-weight: bold;
            color: #fff; cursor: pointer; font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .bg-green { background: var(--win-green); }
        .bg-violet { background: var(--violet-primary); }
        .bg-red { background: linear-gradient(135deg, var(--flame-red), #991b1b); }

        .number-matrix {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            background: var(--bg-panel); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .num-btn {
            width: 100%; aspect-ratio: 1; border-radius: 50%; border: none;
            font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
        }
        
        /* Specific Number Colors mimicking GoaGames */
        .num-red { background: var(--flame-red); }
        .num-green { background: var(--win-green); }
        .num-violet-red { background: linear-gradient(135deg, var(--violet-primary) 50%, var(--flame-red) 50%); }
        .num-violet-green { background: linear-gradient(135deg, var(--violet-primary) 50%, var(--win-green) 50%); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 420px; background: var(--bg-panel);
            display: flex; height: 65px; border-top: 1px solid rgba(139,92,246,0.3);
            border-top-left-radius: 15px; border-top-right-radius: 15px;
            z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.75rem; cursor: pointer;
        }
        .nav-item.active { color: var(--flame-orange); font-weight: bold; }
        .nav-icon { font-size: 1.3rem; margin-bottom: 3px; }

        /* Auth Form */
        .auth-container { padding: 30px 20px; display: none; }
        .auth-container.active { display: block; }
        .input-ctrl {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid var(--violet-primary); background: var(--bg-panel);
            color: white; box-sizing: border-box; font-size: 1rem;
        }
        .btn-submit {
            width: 100%; padding: 15px; border-radius: 8px; border: none;
            background: linear-gradient(to right, var(--flame-red), var(--flame-orange));
            color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- AUTH VIEW -->
    <div id="view-auth" class="auth-container active">
        <h2 style="text-align: center; color: var(--flame-orange);">K9BETS LOGIN</h2>
        <input type="text" id="phone" class="input-ctrl" placeholder="Mobile Number">
        <input type="password" id="password" class="input-ctrl" placeholder="Password">
        <button class="btn-submit" onclick="login()">Enter Arena</button>
        <p style="text-align: center; color: var(--text-muted); margin-top: 20px; cursor: pointer;" onclick="toggleAuth()">New User? Register Here</p>
    </div>

    <!-- MAIN APP VIEW -->
    <div id="view-main" style="display: none;">
        <div class="top-header">
            <div class="brand-title">K9BETS</div>
            <div class="balance-label">Wallet Balance</div>
            <div class="balance-amount">₹<span id="uiBalance">0.00</span></div>
        </div>

        <div class="action-grid">
            <div class="action-icon">Deposit</div>
            <div class="action-icon">Withdraw</div>
            <div class="action-icon">VIP</div>
            <div class="action-icon">Activity</div>
        </div>

        <!-- WINGO GAME SECTION -->
        <div class="game-section active">
            <div class="timer-header">
                <div class="period-box">
                    <div class="period-lbl">WinGo 30s Period</div>
                    <div class="period-val" id="uiPeriod">Loading...</div>
                </div>
                <div class="countdown-box">
                    <div class="period-lbl">Time Remaining</div>
                    <div class="countdown-val" id="uiTimer">00:30</div>
                </div>
            </div>

            <div class="color-matrix">
                <button class="color-btn bg-green" onclick="placeBet('Green')">Green</button>
                <button class="color-btn bg-violet" onclick="placeBet('Violet')">Violet</button>
                <button class="color-btn bg-red" onclick="placeBet('Red')">Red</button>
            </div>

            <div class="number-matrix">
                <button class="num-btn num-violet-red" onclick="placeBet(0)">0</button>
                <button class="num-btn num-green" onclick="placeBet(1)">1</button>
                <button class="num-btn num-red" onclick="placeBet(2)">2</button>
                <button class="num-btn num-green" onclick="placeBet(3)">3</button>
                <button class="num-btn num-red" onclick="placeBet(4)">4</button>
                <button class="num-btn num-violet-green" onclick="placeBet(5)">5</button>
                <button class="num-btn num-red" onclick="placeBet(6)">6</button>
                <button class="num-btn num-green" onclick="placeBet(7)">7</button>
                <button class="num-btn num-red" onclick="placeBet(8)">8</button>
                <button class="num-btn num-green" onclick="placeBet(9)">9</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item">
                <span class="nav-icon">🏠</span>Home
            </div>
            <div class="nav-item active">
                <span class="nav-icon">🎰</span>WinGo
            </div>
            <div class="nav-item" onclick="logout()">
                <span class="nav-icon">🚪</span>Logout
            </div>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem('k9b_token');
    let isRegistering = false;

    if (token) showApp();

    function toggleAuth() {
        isRegistering = !isRegistering;
        document.querySelector('.btn-submit').innerText = isRegistering ? "Register Account" : "Enter Arena";
        document.querySelector('p').innerText = isRegistering ? "Back to Login" : "New User? Register Here";
    }

    async function login() {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const endpoint = isRegistering ? '/api/auth/register' : '/api/auth/login';

        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone, password })
        });
        const data = await res.json();
        if(data.error) return alert(data.error);

        localStorage.setItem('k9b_token', `Bearer ${data.token}`);
        token = `Bearer ${data.token}`;
        showApp();
    }

    function showApp() {
        document.getElementById('view-auth').classList.remove('active');
        document.getElementById('view-main').style.display = 'block';
        fetchProfile();
        setInterval(syncGame, 1000);
    }

    async function fetchProfile() {
        const res = await fetch('/api/user/profile', { headers: {'Authorization': token} });
        if(res.status === 401 || res.status === 403) return logout();
        const data = await res.json();
        document.getElementById('uiBalance').innerText = data.balance.toFixed(2);
    }

    async function syncGame() {
        const res = await fetch('/api/games/state');
        const data = await res.json();
        const timer = data["30s"];
        
        document.getElementById('uiPeriod').innerText = timer.period;
        let sec = timer.remaining.toString().padStart(2, '0');
        document.getElementById('uiTimer').innerText = `00:${sec}`;
        
        // Refresh balance periodically to catch wins
        if(timer.remaining === 28) fetchProfile(); 
    }

    async function placeBet(selection) {
        const amount = prompt(`Betting on ${selection}. Enter amount:`);
        if(!amount) return;

        const res = await fetch('/api/games/bet', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token
            },
            body: JSON.stringify({ selection, amount })
        });
        const data = await res.json();
        if(data.error) alert(data.error);
        else {
            alert('Bet Placed!');
            fetchProfile();
        }
    }

    function logout() {
        localStorage.removeItem('k9b_token');
        location.reload();
    }
</script>

</body>
</html>
