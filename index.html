<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K9BETS - WinGo</title>
    <style>
        /* ... Keep your existing CSS here ... */
        .bet-controls { margin-top: 20px; text-align: center; }
        .bet-input { padding: 10px; width: 80%; border-radius: 5px; border: 1px solid #8b5cf6; background: #1e0a3c; color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- AUTH VIEW -->
        <div id="view-auth" class="auth-container active">
            <h2 style="text-align: center; color: var(--flame-orange);">K9BETS LOGIN</h2>
            <input type="text" id="phone" class="input-ctrl" placeholder="Mobile Number">
            <input type="password" id="password" class="input-ctrl" placeholder="Password">
            <button class="btn-submit" onclick="login()">Enter Arena</button>
        </div>

        <!-- MAIN APP -->
        <div id="view-main" style="display: none;">
            <div class="top-header">
                <div class="balance-amount">₹<span id="uiBalance">0.00</span></div>
            </div>
            
            <div class="game-section active">
                <div class="timer-header">
                    <div class="period-val" id="uiPeriod">Syncing...</div>
                    <div class="countdown-val" id="uiTimer">--:--</div>
                </div>

                <!-- Betting Input UI instead of prompt -->
                <div class="bet-controls">
                    <input type="number" id="betAmount" class="bet-input" placeholder="Enter Amount (e.g., 10)">
                </div>

                <div class="color-matrix">
                    <button class="color-btn bg-green" onclick="placeBet('Green')">Green</button>
                    <button class="color-btn bg-violet" onclick="placeBet('Violet')">Violet</button>
                    <button class="color-btn bg-red" onclick="placeBet('Red')">Red</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('k9b_token');
        
        async function placeBet(selection) {
            const amount = document.getElementById('betAmount').value;
            if(!amount || amount <= 0) return alert("Please enter a valid amount");

            try {
                const res = await fetch('/api/games/bet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': token },
                    body: JSON.stringify({ selection, amount })
                });
                const data = await res.json();
                if(res.ok) {
                    alert('Bet Placed!');
                    fetchProfile();
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Connection error. Try again.");
            }
        }

        async function syncGame() {
            try {
                const res = await fetch('/api/games/state');
                const data = await res.json();
                document.getElementById('uiPeriod').innerText = data.period;
                document.getElementById('uiTimer').innerText = `00:${String(data.remaining).padStart(2, '0')}`;
            } catch (err) { console.error("Sync failed"); }
        }

        setInterval(syncGame, 1000);
    </script>
</body>
</html>
